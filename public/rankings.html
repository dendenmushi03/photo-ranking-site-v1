<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランキング | AI美女ランキング</title>
  <link rel="stylesheet" href="ui.css" />
  <style>
    .top3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
    .rank-card img{aspect-ratio:3/4;object-fit:cover;border-radius:10px;margin-bottom:10px}
    .rank-badge{font-weight:700;color:#fff;padding:4px 10px;border-radius:999px;display:inline-block}
    .gold{background:#ca8a04}.silver{background:#64748b}.bronze{background:#b45309}
    .list{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  </style>
</head>
<body data-page="rankings">
<header class="site-header"><div class="header-inner"><a class="brand" href="/"><span class="brand-mark"></span><span><strong>AI Beauty Rank</strong><div class="brand-sub">myrankingphoto.com</div></span></a><button class="menu-toggle" type="button" aria-expanded="false">☰</button><nav class="site-nav"><ul><li><a href="/" data-page="top">トップ</a></li><li><a href="/vote.html" data-page="vote">投票</a></li><li><a href="/rankings.html" data-page="rankings">ランキング</a></li><li><a href="/upload.html" data-page="upload">投稿</a></li><li><a href="/history.html" data-page="history">履歴 / チャット</a></li></ul></nav></div></header>
<main class="page-shell">
<section class="card section"><h1 class="page-title">ランキング（1〜10位）</h1><p class="page-lead">上位3位は特別表示。11位以下は専用ページから確認できます。</p></section>
<section class="section"><div id="top-ranking" class="top3"></div></section>
<section class="section card"><h2 style="margin-top:0">4位〜10位</h2><div id="rank-list" class="list"></div></section>
<section class="section" style="display:flex;gap:10px;flex-wrap:wrap;"><a class="btn btn-primary" href="/vote.html">投票ページへ</a><a class="btn btn-secondary" href="/rankings-others.html">11位以下を見る</a></section>
</main>
<footer class="footer"><div class="footer-inner"><small>© myrankingphoto.com</small><div class="footer-links"><a href="/privacy.html">プライバシーポリシー</a><a href="/terms.html">利用規約</a><a href="/contact.html">お問い合わせ</a></div></div></footer>
<script src="ui.js"></script>
<script>
Promise.all([fetch('/photo-meta').then(r=>r.json()), fetch('/api/rankings').then(r=>r.json())]).then(([meta, rankings]) => {
  const merged = rankings.map(item => ({ fileId: item.id, votes: item.votes, author: meta.find(m => m.filename === item.id)?.author || '不明' }));
  const top10 = merged.slice(0, 10);
  const top3 = document.getElementById('top-ranking');
  const list = document.getElementById('rank-list');
  const labels = ['gold','silver','bronze'];
  top10.slice(0,3).forEach((item, index) => {
    const card = document.createElement('article');
    card.className = 'card rank-card';
    card.innerHTML = `<span class="rank-badge ${labels[index]}">${index+1}位</span><img src="/image/${item.fileId}" alt="${index+1}位"><h3>${item.author} さん</h3><p class="page-lead">得票数 ${item.votes} 票</p><button class="btn btn-secondary" onclick="vote('${item.fileId}')">投票する</button>`;
    top3.appendChild(card);
  });
  top10.slice(3).forEach((item, i) => {
    const card = document.createElement('article');
    card.className = 'card rank-card';
    card.innerHTML = `<strong>${i+4}位</strong><img src="/image/${item.fileId}" alt="${i+4}位"><h4>${item.author} さん</h4><p class="page-lead">${item.votes} 票</p><button class="btn btn-ghost" onclick="vote('${item.fileId}')">この子に投票</button>`;
    list.appendChild(card);
  });
});
function vote(fileId){fetch('/api/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageUrl:fileId,characterId:fileId})}).then(r=>r.json()).then(d=>{if(d.success){alert('投票しました');location.reload();}else{alert('投票に失敗しました');}}).catch(()=>alert('通信エラーが発生しました。'));}
</script>
</body>
</html>
