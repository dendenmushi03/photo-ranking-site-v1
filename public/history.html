<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>履歴 / チャット導線 | AI美女ランキング</title>
  <link rel="stylesheet" href="ui.css">
  <style>
    .history-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px}
    .history-card img{aspect-ratio:3/4;object-fit:cover;border-radius:10px;margin-bottom:10px}
    .history-actions{display:grid;gap:8px}
  </style>
</head>
<body data-page="history">
<header class="site-header"><div class="header-inner"><a class="brand" href="/"><span class="brand-mark"></span><span><strong>AI Beauty Rank</strong><div class="brand-sub">myrankingphoto.com</div></span></a><button class="menu-toggle" type="button" aria-expanded="false">☰</button><nav class="site-nav"><ul><li><a href="/" data-page="top">トップ</a></li><li><a href="/vote.html" data-page="vote">投票</a></li><li><a href="/rankings.html" data-page="rankings">ランキング</a></li><li><a href="/upload.html" data-page="upload">投稿</a></li><li><a href="/history.html" data-page="history">履歴 / チャット</a></li></ul></nav></div></header>
<main class="page-shell">
<section class="card"><h1 class="page-title">投票履歴</h1><p class="page-lead">投票した画像からチャットや告白に進めます。主導線は「チャットする」です。</p></section>
<section class="section"><div id="history" class="history-grid"></div></section>
<section class="section" style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn btn-primary" href="/girlfriends.html">彼女ページへ</a><a class="btn btn-secondary" href="/vote.html">投票ページへ</a><a class="btn btn-ghost" href="/rankings.html">ランキングへ</a></section>
</main>
<footer class="footer"><div class="footer-inner"><small>© myrankingphoto.com</small><div class="footer-links"><a href="/privacy.html">プライバシーポリシー</a><a href="/terms.html">利用規約</a><a href="/contact.html">お問い合わせ</a></div></div></footer>

<div id="confessModal" class="modal hidden"><div class="card modal-card"><h2 id="confessMessage">告白結果</h2><img id="confessImage" src="" alt="告白画像" style="max-width:220px;margin:0 auto 10px;border-radius:12px;"><div id="confessButtons" style="display:grid;gap:8px"></div><button class="btn btn-ghost" type="button" onclick="closeConfessModal()">閉じる</button></div></div>

<script src="ui.js"></script>
<script>
fetch('/api/vote-history').then(res => res.ok ? res.json() : Promise.reject()).then(data => {
  const container = document.getElementById('history');
  const girlfriends = JSON.parse(localStorage.getItem('girlfriends') || '[]');
  const rejected = JSON.parse(localStorage.getItem('rejectedGirls') || '[]');
  const girlfriendKeys = new Set(girlfriends.map(g => `${g.characterId}-${g.timestamp}`));
  const filtered = data.filter(entry => !girlfriendKeys.has(`${entry.characterId}-${entry.timestamp}`) && !rejected.includes(`${entry.characterId}-${entry.timestamp}`));
  if (!filtered.length) { container.innerHTML = '<div class="card">表示できる履歴がありません。まずは投票してみましょう。</div>'; return; }
  filtered.forEach(entry => {
    const card = document.createElement('article');
    card.className = 'card history-card';
    card.innerHTML = `<img src="/image/${entry.imageUrl}" alt="履歴画像"><p class="page-lead">${new Date(entry.timestamp).toLocaleString()}</p><div class="history-actions"><button class="btn btn-primary" onclick="startChat('${entry.characterId}','${entry.imageUrl}')">チャットする</button><button class="btn btn-secondary" onclick="addToGirlfriends('${entry.characterId}','${entry.imageUrl}','${entry.timestamp}')">告白する</button><button class="btn btn-ghost" onclick="deleteVote('${entry.characterId}','${entry.timestamp}',this)">履歴を削除</button></div>`;
    container.appendChild(card);
  });
}).catch(()=>{document.getElementById('history').innerHTML='<p>履歴の読み込みに失敗しました。</p>';});

function deleteVote(characterId,timestamp,button){if(!confirm('この投票履歴を削除しますか？'))return;fetch('/api/delete-vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({characterId,timestamp})}).then(res=>{if(res.ok){button.closest('.history-card').remove();}else{alert('削除に失敗しました。');}})}
function startChat(characterId,imageUrl){localStorage.setItem('chatCharacterId',characterId);localStorage.setItem('chatCharacterImage',`/image/${imageUrl}`);localStorage.setItem('chatContext','history');window.location.href='chat.html';}
function addToGirlfriends(characterId,imageUrl,timestamp){const girlfriends=JSON.parse(localStorage.getItem('girlfriends')||'[]');if(girlfriends.length>=3)return alert('彼女は3人までしか登録できません！');if(girlfriends.some(g=>String(g.characterId)===String(characterId)))return alert('すでに彼女リストに追加されています！');const success=Math.random()<0.3;if(success){girlfriends.push({characterId,imageUrl,timestamp});localStorage.setItem('girlfriends',JSON.stringify(girlfriends));showConfessModal(true,imageUrl);}else{const rejected=JSON.parse(localStorage.getItem('rejectedGirls')||'[]');rejected.push(`${characterId}-${timestamp}`);localStorage.setItem('rejectedGirls',JSON.stringify(rejected));showConfessModal(false,imageUrl);}fetch('/api/vote-history',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageUrl})});document.querySelector(`.history-card img[src='/image/${imageUrl}']`)?.closest('.history-card')?.remove();}
function showConfessModal(success,imageUrl){const msg=document.getElementById('confessMessage');const img=document.getElementById('confessImage');const buttons=document.getElementById('confessButtons');if(success){msg.textContent='告白成功';img.src=`/image/${imageUrl}`;img.style.display='block';buttons.innerHTML='<a class="btn btn-primary" href="/girlfriends.html">彼女ページへ</a>';}else{msg.textContent='告白は成立しませんでした';img.style.display='none';buttons.innerHTML='<a class="btn btn-secondary" href="/history.html">別の相手に告白する</a>';}document.getElementById('confessModal').classList.remove('hidden');}
function closeConfessModal(){document.getElementById('confessModal').classList.add('hidden');}
</script>
</body>
</html>
