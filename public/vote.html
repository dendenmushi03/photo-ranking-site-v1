<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>投票 | AI美女ランキング</title>
  <link rel="stylesheet" href="ui.css" />
  <style>
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-top:20px}
    .photo-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;cursor:pointer;transition:.2s}
    .photo-card:hover{transform:translateY(-2px)}
    .photo-card.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
    .photo-card img{aspect-ratio:3/4;object-fit:cover;border-radius:10px}
    .vote-cta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:20px}
  </style>
</head>
<body data-page="vote">
<header class="site-header"><div class="header-inner"><a class="brand" href="/"><span class="brand-mark"></span><span><strong>AI Beauty Rank</strong><div class="brand-sub">myrankingphoto.com</div></span></a><button class="menu-toggle" type="button" aria-expanded="false">☰</button><nav class="site-nav"><ul><li><a href="/" data-page="top">トップ</a></li><li><a href="/vote.html" data-page="vote">投票</a></li><li><a href="/rankings.html" data-page="rankings">ランキング</a></li><li><a href="/upload.html" data-page="upload">投稿</a></li><li><a href="/history.html" data-page="history">履歴 / チャット</a></li></ul></nav></div></header>

<main class="page-shell">
  <section class="card">
    <h1 class="page-title">今日の投票</h1>
    <p class="page-lead">1枚だけ選んで「投票する」を押してください。選択中のカードがハイライトされます。</p>
    <form id="voteForm">
      <div id="photo-container" class="photo-grid"></div>
      <div class="vote-cta">
        <button class="btn btn-primary" id="vote-button" type="submit">この写真に投票する</button>
        <button class="btn btn-secondary" id="reload-button" type="button">写真を入れ替える</button>
      </div>
    </form>
  </section>

  <section class="grid-3 section">
    <a class="card" href="/rankings.html" style="text-decoration:none;"><h3>ランキングを見る</h3><p class="page-lead">上位画像をチェック</p></a>
    <a class="card" href="/history.html" style="text-decoration:none;"><h3>履歴 / チャット</h3><p class="page-lead">投票後の行動はこちら</p></a>
    <a class="card" href="/upload.html" style="text-decoration:none;"><h3>画像を投稿</h3><p class="page-lead">あなたの作品をエントリー</p></a>
  </section>
</main>

<footer class="footer"><div class="footer-inner"><small>© myrankingphoto.com</small><div class="footer-links"><a href="/privacy.html">プライバシーポリシー</a><a href="/terms.html">利用規約</a><a href="/contact.html">お問い合わせ</a></div></div></footer>

<div id="voteModal" class="modal hidden"><div class="card modal-card"><h2 style="margin-top:0">投票完了</h2><img id="votedImage" src="" alt="投票画像" style="max-width:220px;margin:0 auto 12px;border-radius:12px;"><p class="page-lead" style="text-align:center">ご投票ありがとうございます。次のアクションを選んでください。</p><div style="display:grid;gap:10px"><a class="btn btn-primary" href="/rankings.html">ランキングを見る</a><a class="btn btn-secondary" href="/history.html">チャット / 履歴へ</a><button class="btn btn-ghost" onclick="closeModal()" type="button">閉じる</button></div></div></div>

<script src="ui.js"></script>
<script>
  fetch('/photo-meta').then(res => res.ok ? res.json() : Promise.reject()).then(photos => {
    const container = document.getElementById('photo-container');
    container.innerHTML = '';
    photos.sort(() => 0.5 - Math.random()).slice(0, 6).forEach((photo, index) => {
      const card = document.createElement('article');
      card.className = 'photo-card';
      card.dataset.photoId = photo.filename;
      card.innerHTML = `<img src="/image/${photo.filename}" alt="候補画像${index+1}"><p><strong>${photo.author}</strong> さん</p>`;
      card.addEventListener('click', () => {
        document.querySelectorAll('.photo-card').forEach(el => el.classList.remove('selected'));
        card.classList.add('selected');
      });
      container.appendChild(card);
    });
  }).catch(() => {
    document.getElementById('photo-container').innerHTML = '<p>写真の読み込みに失敗しました。</p>';
  });

  document.getElementById('voteForm').addEventListener('submit', (event) => {
    event.preventDefault();
    const selected = document.querySelector('.photo-card.selected');
    if (!selected) return alert('投票する写真を選んでください。');
    const photoId = selected.dataset.photoId;
    fetch('/vote-photo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ photoId }) })
      .then(res => res.ok ? res.json() : Promise.reject())
      .then(() => fetch('/api/vote', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ imageUrl: photoId, characterId: '001' }) }))
      .then(res => res.ok ? res.json() : Promise.reject())
      .then(() => {
        document.getElementById('votedImage').src = `/image/${photoId}`;
        document.getElementById('voteModal').classList.remove('hidden');
      }).catch(() => alert('投票処理でエラーが発生しました。'));
  });

  document.getElementById('reload-button').addEventListener('click', () => location.reload());
  function closeModal() { document.getElementById('voteModal').classList.add('hidden'); location.reload(); }
</script>
</body>
</html>
