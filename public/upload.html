<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投稿 | AI美女ランキング</title>
  <link rel="stylesheet" href="ui.css" />
  <style>
    .drop{border:2px dashed #c9d2ea;border-radius:16px;padding:28px;text-align:center;background:var(--surface-soft)}
    .form-grid{display:grid;gap:16px}
  </style>
</head>
<body data-page="upload">
<header class="site-header"><div class="header-inner"><a class="brand" href="/"><span class="brand-mark"></span><span><strong>AI Beauty Rank</strong><div class="brand-sub">myrankingphoto.com</div></span></a><button class="menu-toggle" type="button" aria-expanded="false">☰</button><nav class="site-nav"><ul><li><a href="/" data-page="top">トップ</a></li><li><a href="/vote.html" data-page="vote">投票</a></li><li><a href="/rankings.html" data-page="rankings">ランキング</a></li><li><a href="/upload.html" data-page="upload">投稿</a></li><li><a href="/history.html" data-page="history">履歴 / チャット</a></li></ul></nav></div></header>
<main class="page-shell">
<section class="card"><h1 class="page-title">AI画像を投稿する</h1><p class="page-lead">画像と投稿者名を入力して送信。審査後にランキング対象として公開されます。</p>
<form id="uploadForm" class="form-grid" enctype="multipart/form-data">
  <div><label class="field-label" for="photo">画像を選択（複数可）</label><div class="drop"><input type="file" id="photo" name="photo" accept="image/*" multiple required><p class="page-lead" id="fileHint">ドラッグ＆ドロップまたはクリックして選択</p></div></div>
  <div><label class="field-label" for="author">投稿者名（10文字以内）</label><input class="input" type="text" id="author" name="author" maxlength="10" placeholder="ニックネーム" required></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap"><button id="uploadButton" class="btn btn-primary" type="submit">アップロードする</button><a class="btn btn-secondary" href="/vote.html">投票ページへ</a></div>
</form></section>
</main>
<footer class="footer"><div class="footer-inner"><small>© myrankingphoto.com</small><div class="footer-links"><a href="/privacy.html">プライバシーポリシー</a><a href="/terms.html">利用規約</a><a href="/contact.html">お問い合わせ</a></div></div></footer>
<script src="ui.js"></script>
<script src="upload.js"></script>
<script>
document.getElementById('photo').addEventListener('change',(e)=>{const count=e.target.files.length;document.getElementById('fileHint').textContent=count?`${count}件のファイルを選択中`:'ドラッグ＆ドロップまたはクリックして選択';});
</script>
</body>
</html>
